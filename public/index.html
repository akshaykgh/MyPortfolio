<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080812" />
    <meta name="description" content="Akshaykumar Gangadhar Hanmandla - Portfolio Website" />
    <title>Akshaykumar Hanmandla - Portfolio</title>
    <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #080812;
        transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.5s;
      }
      #splash.splash--exit {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .splash__wrap {
        position: relative;
        width: 92px;
        height: 92px;
      }
      .splash__orbit {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid rgba(167, 139, 250, 0.2);
        border-top-color: #ff6b9d;
        border-right-color: #a78bfa;
        animation: splash-orbit-spin 0.95s linear infinite;
      }
      .splash__pulse {
        position: absolute;
        inset: 12px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(124, 108, 240, 0.35) 0%, transparent 70%);
        animation: splash-pulse 1.6s ease-in-out infinite;
      }
      .splash__mark {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Georgia, 'Times New Roman', serif;
        font-weight: 700;
        font-size: 1.35rem;
        letter-spacing: 0.02em;
        background: linear-gradient(120deg, #ff6b9d 0%, #c084fc 40%, #5eead4 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      @keyframes splash-orbit-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes splash-pulse {
        0%,
        100% {
          transform: scale(0.88);
          opacity: 0.65;
        }
        50% {
          transform: scale(1.05);
          opacity: 1;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .splash__orbit {
          animation: none;
          border-color: rgba(167, 139, 250, 0.45);
        }
        .splash__pulse {
          animation: none;
          opacity: 0.85;
        }
        #splash {
          transition-duration: 0.15s;
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="splash" class="splash" aria-busy="true" aria-label="Loading portfolio">
      <div class="splash__wrap">
        <div class="splash__pulse" aria-hidden="true"></div>
        <div class="splash__orbit" aria-hidden="true"></div>
        <div class="splash__mark">AK</div>
      </div>
    </div>
    <div id="root"></div>
  </body>
</html>
